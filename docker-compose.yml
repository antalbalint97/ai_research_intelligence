version: "3.9"

services:
  api:
    build: .
    container_name: ai-research-intelligence-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LLM_MODEL_PATH: /app/models/qwen2.5-3b-instruct-q5_k_m.gguf
      LLM_MODEL_PATH_FAST: /app/models/qwen2.5-3b-instruct-q5_k_m.gguf
      LLM_N_THREADS: 8
      LLM_MAX_TOKENS_FAST: 96
      LLM_MAX_TOKENS_FULL: 256
      LLM_N_CTX_FAST: 2048
      LLM_N_CTX_FULL: 4096
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    restart: unless-stopped

  streamlit:
    build: .
    container_name: ai-research-intelligence-ui
    command: ["streamlit", "run", "app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    profiles:
      - ui