<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Research Intelligence</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔬 AI Research Intelligence</h1>
            <p class="subtitle">Explore recent AI research trends · Strategic insights for investors &amp; innovation teams</p>
        </header>

        <div class="topic-chips" id="topic-chips"></div>

        <div class="query-box">
            <textarea
                id="query-input"
                placeholder="Ask about recent AI research trends…&#10;e.g. What are the emerging trends in multimodal AI?"
                rows="3"
            ></textarea>
            <button id="send-btn" onclick="sendQuery()">Ask →</button>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <span>Analyzing research papers…</span>
        </div>

        <div id="answer-section" class="answer-section hidden">
            <div class="answer-header">
                <h2>Answer</h2>
                <span id="meta-info" class="meta-info"></span>
            </div>
            <div id="answer-text" class="answer-text"></div>

            <div id="sources-section" class="sources-section hidden">
                <h3>📄 Sources</h3>
                <div id="sources-list" class="sources-list"></div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
